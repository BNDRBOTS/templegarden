<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!--
    viewport: handles pinch-zoom locally via
    touch events to yield a fully designed experience.
  -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0,
                 maximum-scale=1.0, user-scalable=no,
                 viewport-fit=cover" />
  <meta name="theme-color" content="#020408" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Zero-Gravity Temple Garden</title>

  <style>
    /* ============================================================
       RESET & BASE — zero-margin, box-sizing layout
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ---- CSS custom properties — palette & timing ------------- */
    :root {
      --bone:        #F5F0E8;
      --bone-soft:   #EDE6D4;
      --bone-dim:    rgba(245,240,232,0.55);
      --pitch:       #020408;
      --teal-deep:   #001F1F;
      --teal-mid:    #007A7A;
      --teal-bright: #00E5E5;
      --teal-glow:   rgba(0,229,229,0.6);
      --summer-gold: #FFD166;
      --summer-rose: #FF6B9D;
      --summer-lav:  #C77DFF;
      --summer-sky:  #48CAE4;
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ---- Full-screen layout ------------------------- */
    html, body {
      width: 100%;
      height: 100%;
      /* 100dvh accommodates mobile address bars gracefully */
      height: 100dvh;
      overflow: hidden;
      background: var(--pitch);
      font-family: 'Georgia', 'Times New Roman', serif;
      color: var(--bone);
      /* Locks viewport for native canvas interactions */
      overscroll-behavior: none;
      touch-action: none;
    }

    /* ---- Typography Accessibility & Mobile Tap ---- */
    h1, h2, p, span {
      user-select: text;
      -webkit-user-select: text;
    }

    button, #play-btn, #mute-btn, .spark, svg {
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    /* ============================================================
       CANVAS STACK — two canvases:
       #bgCanvas  = static / slow-refresh background layer
       #fgCanvas  = fast-refresh petals + particles layer
       Both are drawn in the main loop via two ctx refs.
    ============================================================ */
    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    #bgCanvas { z-index: 0; }
    #fgCanvas { z-index: 1; }

    /* ============================================================
       OVERLAY UI — pass-through pointer-events by default, only
       interactive children capture them.
    ============================================================ */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* respect safe-area notches */
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ---- Header title ---------------------------------------- */
    #header {
      text-align: center;
      padding: clamp(1.6rem, 5vw, 2.8rem) 1.5rem 0;
      letter-spacing: 0.22em;
      opacity: 0;
      animation: fadeSlide 2.2s 1s var(--ease-out) forwards;
    }

    #header h1 {
      font-size: clamp(0.62rem, 1.9vw, 1rem);
      font-weight: 400;
      text-transform: uppercase;
      color: var(--bone-soft);
      text-shadow:
        0 0 20px var(--teal-glow),
        0 0 60px rgba(0,200,200,0.18);
    }

    #header p {
      margin-top: 0.55rem;
      font-size: clamp(0.48rem, 1.3vw, 0.65rem);
      letter-spacing: 0.42em;
      color: var(--teal-bright);
      text-transform: uppercase;
      opacity: 0.75;
    }

    /* ---- Bottom controls ------------------------------------- */
    #bottom-bar {
      margin-top: auto;
      pointer-events: all;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      padding: 0 1.5rem clamp(1.8rem, 6vw, 3rem);
      opacity: 0;
      animation: fadeSlide 1.4s 4.2s var(--ease-out) forwards;
    }

    #hint {
      font-size: clamp(0.42rem, 1.1vw, 0.56rem);
      letter-spacing: 0.44em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.28);
      pointer-events: none;
    }

    /* ---- Mute pill ------------------------------------------ */
    #mute-btn {
      display: none; /* revealed when audio begins */
      pointer-events: all;
      background: transparent;
      border: 1px solid rgba(0,229,229,0.28);
      border-radius: 999px;
      color: var(--teal-bright);
      font-size: clamp(0.5rem, 1.3vw, 0.62rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 0.5em 1.6em;
      cursor: pointer;
      transition:
        background 0.28s ease,
        box-shadow  0.28s ease,
        color       0.28s ease,
        border-color 0.28s ease;
      min-width: 44px;
      min-height: 44px;
    }

    #mute-btn:hover,
    #mute-btn:focus-visible {
      background: rgba(0,229,229,0.1);
      box-shadow: 0 0 22px rgba(0,229,229,0.28);
      color: #fff;
      border-color: rgba(0,229,229,0.6);
      outline: none;
    }

    /* ============================================================
       SACRED PLAY BUTTON — blooms from the absolute lotus centre.
       Designed to feel like the eye of the mandala opening.
    ============================================================ */
    #play-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      pointer-events: all;
    }

    /* Outer orbital ring 1 */
    #play-wrap::before {
      content: '';
      position: absolute;
      inset: -28px;
      border-radius: 50%;
      border: 1px solid rgba(0,229,229,0.16);
      animation: spinSlow 14s linear infinite;
      pointer-events: none;
    }

    /* Outer orbital ring 2 */
    #play-wrap::after {
      content: '';
      position: absolute;
      inset: -50px;
      border-radius: 50%;
      border: 1px solid rgba(199,125,255,0.10);
      animation: spinSlow 22s linear infinite reverse;
      pointer-events: none;
    }

    #play-btn {
      position: relative;
      width: clamp(72px, 14vw, 108px);
      height: clamp(72px, 14vw, 108px);
      border-radius: 50%;
      border: 1.5px solid rgba(0,229,229,0.55);
      background: radial-gradient(
        circle at 38% 34%,
        rgba(0,229,229,0.22) 0%,
        rgba(0,10,18,0.88) 65%
      );
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      /* Multi-layer glow */
      box-shadow:
        0 0 28px rgba(0,229,229,0.5),
        0 0 70px rgba(0,229,229,0.18),
        0 0 140px rgba(0,180,180,0.08),
        inset 0 0 22px rgba(0,229,229,0.14);
      transition:
        transform 0.38s var(--ease-spring),
        box-shadow 0.38s ease,
        border-color 0.38s ease;
      opacity: 0;
      animation: blossomIn 1.2s 2.4s var(--ease-spring) forwards;
      -webkit-tap-highlight-color: transparent;
      /* Pulse ring pseudo */
    }

    /* Breathing pulse ring A */
    #play-btn::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(0,229,229,0.25);
      animation: breatheRing 2.8s ease-in-out infinite;
    }

    /* Breathing pulse ring B */
    #play-btn::after {
      content: '';
      position: absolute;
      inset: -22px;
      border-radius: 50%;
      border: 1px solid rgba(255,107,157,0.12);
      animation: breatheRing 2.8s 1.0s ease-in-out infinite;
    }

    /* Play triangle icon — SVG inline */
    #play-icon {
      width: 34%;
      height: 34%;
      fill: var(--teal-bright);
      margin-left: 9%; /* optical centre of triangle */
      filter: drop-shadow(0 0 8px var(--teal-bright));
      transition: fill 0.28s ease, filter 0.28s ease, opacity 0.28s ease;
    }

    /* Pause bars icon (shown when playing) */
    #pause-icon {
      width: 32%;
      height: 32%;
      fill: var(--teal-bright);
      filter: drop-shadow(0 0 8px var(--teal-bright));
      transition: fill 0.28s ease, filter 0.28s ease, opacity 0.28s ease;
      display: none;
    }

    #play-btn:hover,
    #play-btn:focus-visible {
      transform: scale(1.16);
      box-shadow:
        0 0 50px rgba(0,229,229,0.75),
        0 0 100px rgba(0,229,229,0.32),
        0 0 200px rgba(0,180,180,0.14),
        inset 0 0 34px rgba(0,229,229,0.22);
      border-color: rgba(0,229,229,0.9);
    }

    #play-btn:hover #play-icon,
    #play-btn:focus-visible #play-icon {
      fill: #fff;
      filter: drop-shadow(0 0 14px #fff);
    }

    /* Active state — softens the button aesthetics */
    #play-btn.active {
      border-color: rgba(0,229,229,0.35);
      box-shadow:
        0 0 18px rgba(0,229,229,0.3),
        0 0 40px rgba(0,229,229,0.1),
        inset 0 0 14px rgba(0,229,229,0.08);
    }

    /* ============================================================
       PARTICLE SPARKS — spawned as DOM elements on bloom events
       (supplementary to canvas particles, cheaper for rare bursts)
    ============================================================ */
    .spark {
      position: fixed;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 18;
      animation: sparkFly 0.85s var(--ease-out) forwards;
    }

    @keyframes sparkFly {
      0%   { transform: translate(0, 0) scale(1);   opacity: 1; }
      100% { transform: var(--spark-end)  scale(0); opacity: 0; }
    }

    /* ============================================================
       LOADING VEIL
    ============================================================ */
    #veil {
      position: fixed;
      inset: 0;
      background: var(--pitch);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1.4s var(--ease-out);
    }

    #veil.gone {
      opacity: 0;
      pointer-events: none;
    }

    .veil-ring {
      width: clamp(44px, 9vw, 64px);
      height: clamp(44px, 9vw, 64px);
      border-radius: 50%;
      border: 1.5px solid rgba(0,229,229,0.45);
      border-top-color: transparent;
      animation: spin 1.1s linear infinite;
    }

    /* ============================================================
       KEYFRAME LIBRARY
    ============================================================ */
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes blossomIn {
      from { opacity: 0; transform: scale(0.3) rotate(-30deg); }
      to   { opacity: 1; transform: scale(1)   rotate(0deg);   }
    }

    @keyframes breatheRing {
      0%   { transform: scale(1);     opacity: 0.65; }
      55%  { transform: scale(1.22);  opacity: 0.2;  }
      100% { transform: scale(1);     opacity: 0.65; }
    }

    @keyframes spinSlow {
      to { transform: rotate(360deg); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============================================================
       RESPONSIVE FALLBACK — honours reduced-motion preference
    ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- ========================================================
       LOADING VEIL — spins until first paint finishes
  ======================================================== -->
  <div id="veil"><div class="veil-ring"></div></div>

  <!-- ========================================================
       CANVAS STACK
       bgCanvas: background — deep space, aurora, grid
       fgCanvas: foreground — petals, particles, geometry
  ======================================================== -->
  <canvas id="bgCanvas" aria-hidden="true"></canvas>
  <canvas id="fgCanvas" aria-hidden="true"></canvas>

  <!-- ========================================================
       SACRED PLAY BUTTON
       Sits exactly at the visual lotus heart (geometric centre).
       Starts audio context on first user interaction.
  ======================================================== -->
  <div id="play-wrap">
    <button id="play-btn"
            aria-label="Open the garden — begin sound"
            type="button">
      <!-- Play triangle -->
      <svg id="play-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 4l13 8-13 8V4z"/>
      </svg>
      <!-- Pause bars (shown while playing) -->
      <svg id="pause-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="5"  y="4" width="4.5" height="16" rx="1.5"/>
        <rect x="14.5" y="4" width="4.5" height="16" rx="1.5"/>
      </svg>
    </button>
  </div>

  <!-- ========================================================
       OVERLAY UI
  ======================================================== -->
  <div id="ui" role="presentation">

    <header id="header">
      <h1>Zero-Gravity Temple Garden</h1>
      <p>Lotus &nbsp;·&nbsp; Light &nbsp;·&nbsp; Infinity</p>
    </header>

    <div id="bottom-bar">
      <button id="mute-btn" type="button" aria-label="Toggle sound">
        ♬ &nbsp;Sound
      </button>
      <p id="hint">drag to orbit &nbsp;·&nbsp; touch to bloom</p>
    </div>

  </div>

  <!-- ========================================================
       MAIN SCRIPT
       Sections:
         1. Constants & Palette
         2. DOM References
         3. State Management
         4. Web Audio Engine
         5. Canvas Resize Handler
         6. Scene Builders (grid, petals, particles, geometry)
         7. Draw Routines (background, petals, particles, etc.)
         8. Draw Loop
         9. Input Handling (mouse, touch, gyro, wheel)
        10. Boot
  ======================================================== -->
  <script>
  /* ============================================================
     ZERO-GRAVITY TEMPLE GARDEN — v2
     Mobile-first, fully commented, meticulously audited.
  ============================================================ */
  'use strict';

  /* ----------------------------------------------------------
     1. CONSTANTS & PALETTE
  ---------------------------------------------------------- */
  const P = {
    bone:       '#F5F0E8',
    boneSoft:   '#EDE6D4',
    pitch:      '#020408',
    tealDeep:   '#001F1F',
    tealMid:    '#00A0A0',
    tealBright: '#00E5E5',
    tealSoft:   '#00B4B4',
    gold:       '#FFD166',
    rose:       '#FF6B9D',
    lav:        '#C77DFF',
    sky:        '#48CAE4',
    mint:       '#A8FFEF',
    amber:      '#FFAA5A',
  };

  /** Six spectral colours cycling across petals */
  const SPECTRAL = [P.tealBright, P.rose, P.lav, P.gold, P.sky, P.mint];

  /** Golden ratio — used throughout geometry */
  const PHI = 1.6180339887;

  /** Petal count — kept at 12 for dodecagonal symmetry */
  const PETAL_N = 12;

  /** Maximum particle count — adapts to available memory */
  const MAX_PARTICLES = navigator.deviceMemory
    ? (navigator.deviceMemory <= 2 ? 80 : 180)
    : 120;

  /* ----------------------------------------------------------
     2. DOM REFERENCES
  ---------------------------------------------------------- */
  const bgCanvas  = document.getElementById('bgCanvas');
  const fgCanvas  = document.getElementById('fgCanvas');
  const bgCtx     = bgCanvas.getContext('2d');
  const fgCtx     = fgCanvas.getContext('2d');
  const veil      = document.getElementById('veil');
  const playBtn   = document.getElementById('play-btn');
  const playIcon  = document.getElementById('play-icon');
  const pauseIcon = document.getElementById('pause-icon');
  const muteBtn   = document.getElementById('mute-btn');

  /* ----------------------------------------------------------
     3. STATE
  ---------------------------------------------------------- */
  let W = 0, H = 0, DPR = 1;
  let tick   = 0;        // frame counter
  let rafId  = null;     // requestAnimationFrame handle
  let bgTick = 0;        // background-layer dedicated counter

  /* Camera / orbit state */
  const cam = {
    theta:       0,       // horizontal orbit (radians)
    phi:         0.30,    // vertical tilt
    aimTheta:    0,
    aimPhi:      0.30,
    zoom:        1.0,
    aimZoom:     1.0,
    dragging:    false,
    lastX:       0,
    lastY:       0,
    velX:        0,       // inertia velocity X
    velY:        0,       // inertia velocity Y
  };

  /* Pinch-zoom tracking */
  const pinch = { active: false, startDist: 0, startZoom: 1 };

  /* Petals array — built in buildPetals() */
  let petals = [];

  /* Ambient floating particles */
  let particles = [];

  /* Bloom-ring bursts (expanding circles on interaction) */
  let bloomRings = [];

  /* Shockwave bursts (bigger, faster) */
  let shockwaves = [];

  /* Pointer world-space position for hit-testing */
  const ptr = { x: 0, y: 0, active: false };

  /* Gyroscope data (mobile) */
  const gyro = { beta: 0, gamma: 0, supported: false };

  /* Whether audio has been unlocked by user gesture */
  let audioReady = false;

  /* Whether audio is currently suspended (muted) */
  let muted = false;

  /* Web Audio context references */
  let audioCtx   = null;
  let masterGain = null;
  let convolver  = null;

  /* References to per-sound callbacks set up in setupAudio() */
  let sfxBloom = null;
  let sfxBell  = null;
  let sfxChime = null;
  let sfxPluck = null;

  /* Auto-pluck melody state */
  const seq = {
    active:   false,
    step:     0,
    lastTime: 0,
    bpm:      48,   // slow, meditative
    /* Pentatonic scale in Hz — 432 Hz root (sacred tuning) */
    scale: [216, 270, 324, 360, 432, 540, 648, 720, 864],
  };

  /* ----------------------------------------------------------
     4. WEB AUDIO ENGINE
     Audio context waits for user interaction.
     Layers:
       A — Sub drone (60 Hz)
       B — Temple bell pad (triangle 120/180 Hz)
       C — Crystal shimmer (432 Hz + harmonics)
       D — Breath wind (band-passed noise + LFO)
       E — Auto pentatonic pluck sequence
     Sound effects:
       sfxBloom — soft bell on petal hover
       sfxBell  — deep bowl strike on canvas tap
       sfxChime — high shimmer on shockwave
       sfxPluck — melodic pluck on sequencer step
  ---------------------------------------------------------- */

  /** Builds and returns a synthetic reverb convolver node. */
  function buildReverb(ctx, durationSec, decay) {
    const len     = ctx.sampleRate * durationSec;
    const impulse = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let c = 0; c < 2; c++) {
      const ch = impulse.getChannelData(c);
      for (let i = 0; i < len; i++) {
        ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
      }
    }
    const node = ctx.createConvolver();
    node.buffer = impulse;
    return node;
  }

  /**
   * Starts the primary audio graph.
   * Called once on the first user gesture (play button press).
   */
  function setupAudio() {
    if (audioReady) return;
    audioReady = true;

    audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.78, audioCtx.currentTime + 4.0);
    masterGain.connect(audioCtx.destination);

    /* Reverb (long, cathedral-like) */
    convolver = buildReverb(audioCtx, 6.5, 3.0);
    const revGain = audioCtx.createGain();
    revGain.gain.value = 0.52;
    convolver.connect(revGain);
    revGain.connect(masterGain);

    /* Dry signal bus */
    const dryBus = audioCtx.createGain();
    dryBus.gain.value = 0.48;
    dryBus.connect(masterGain);

    /* ---- Layer A: Sub-bass drone ---- */
    const subOsc  = audioCtx.createOscillator();
    const subGain = audioCtx.createGain();
    subOsc.type          = 'sine';
    subOsc.frequency.value = 60;
    subGain.gain.value     = 0.20;
    subOsc.connect(subGain);
    subGain.connect(dryBus);
    subOsc.start();

    /* Slight LFO swell on sub */
    const subLfo     = audioCtx.createOscillator();
    const subLfoGain = audioCtx.createGain();
    subLfo.type            = 'sine';
    subLfo.frequency.value = 0.08;
    subLfoGain.gain.value  = 0.05;
    subLfo.connect(subLfoGain);
    subLfoGain.connect(subGain.gain);
    subLfo.start();

    /* ---- Layer B: Temple bell pad ---- */
    [120, 180, 240].forEach((freq, i) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type           = 'triangle';
      osc.frequency.value = freq;
      osc.detune.value    = (i - 1) * 6; // slight detuning for width
      gain.gain.value     = 0;
      osc.connect(gain);
      gain.connect(convolver);
      osc.start();
      gain.gain.linearRampToValueAtTime(
        0.10 / (i + 1),
        audioCtx.currentTime + 3.5 + i * 1.2
      );
    });

    /* ---- Layer C: Crystal shimmer harmonics ---- */
    [432, 864, 1296, 2160].forEach((freq, i) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type            = 'sine';
      osc.frequency.value = freq;
      gain.gain.value     = 0;
      osc.connect(gain);
      gain.connect(convolver);
      osc.start();
      gain.gain.linearRampToValueAtTime(
        0.032 / (i + 1),
        audioCtx.currentTime + 5 + i * 1.8
      );
    });

    /* ---- Layer D: Breath wind ---- */
    const windBuf    = audioCtx.createBuffer(1, audioCtx.sampleRate * 6, audioCtx.sampleRate);
    const windData   = windBuf.getChannelData(0);
    for (let i = 0; i < windData.length; i++) windData[i] = Math.random() * 2 - 1;

    const windSrc  = audioCtx.createBufferSource();
    windSrc.buffer = windBuf;
    windSrc.loop   = true;

    const bpf       = audioCtx.createBiquadFilter();
    bpf.type        = 'bandpass';
    bpf.frequency.value = 600;
    bpf.Q.value     = 0.38;

    const windGain = audioCtx.createGain();
    windGain.gain.value = 0;
    windSrc.connect(bpf);
    bpf.connect(windGain);
    windGain.connect(convolver);
    windSrc.start();
    windGain.gain.linearRampToValueAtTime(0.045, audioCtx.currentTime + 4.5);

    /* LFO for wind breathing */
    const windLfo     = audioCtx.createOscillator();
    const windLfoGain = audioCtx.createGain();
    windLfo.type            = 'sine';
    windLfo.frequency.value = 0.12;
    windLfoGain.gain.value  = 0.022;
    windLfo.connect(windLfoGain);
    windLfoGain.connect(windGain.gain);
    windLfo.start();

    /* ---- Layer E: Auto pentatonic sequencer ---- */
    seq.active = true;

    /* ================================================================
       SOUND EFFECTS — closures capturing audioCtx / convolver / masterGain
    ================================================================ */

    /** Soft bloom bell — triggered on petal hover */
    sfxBloom = function() {
      if (!audioCtx || muted) return;
      const t   = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.type            = 'sine';
      osc.frequency.setValueAtTime(540, t);
      osc.frequency.exponentialRampToValueAtTime(270, t + 1.1);
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.22, t + 0.04);
      env.gain.exponentialRampToValueAtTime(0.001, t + 1.1);
      osc.connect(env);
      env.connect(convolver);
      env.connect(masterGain);
      osc.start(t);
      osc.stop(t + 1.2);
    };

    /** Deep bowl strike — triggered on canvas tap / click */
    sfxBell = function() {
      if (!audioCtx || muted) return;
      const t    = audioCtx.currentTime;
      const bowl = audioCtx.createOscillator();
      const env  = audioCtx.createGain();
      bowl.type            = 'sine';
      bowl.frequency.setValueAtTime(216, t);
      bowl.frequency.exponentialRampToValueAtTime(108, t + 0.6);
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.36, t + 0.012);
      env.gain.exponentialRampToValueAtTime(0.001, t + 3.8);
      bowl.connect(env);
      env.connect(convolver);
      env.connect(masterGain);
      bowl.start(t);
      bowl.stop(t + 4.0);
    };

    /** High shimmer — triggered on shockwave */
    sfxChime = function() {
      if (!audioCtx || muted) return;
      const t = audioCtx.currentTime;
      [1080, 1620, 2160].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const env = audioCtx.createGain();
        osc.type            = 'sine';
        osc.frequency.value = freq;
        env.gain.setValueAtTime(0, t + i * 0.04);
        env.gain.linearRampToValueAtTime(0.09 / (i + 1), t + i * 0.04 + 0.02);
        env.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.8);
        osc.connect(env);
        env.connect(convolver);
        osc.start(t + i * 0.04);
        osc.stop(t + i * 0.04 + 0.9);
      });
    };

    /** Melodic pentatonic pluck — sequencer step */
    sfxPluck = function(freqHz) {
      if (!audioCtx || muted) return;
      const t   = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.type            = 'triangle';
      osc.frequency.value = freqHz;
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.14, t + 0.008);
      env.gain.exponentialRampToValueAtTime(0.001, t + 1.6);
      osc.connect(env);
      env.connect(convolver);
      env.connect(masterGain);
      osc.start(t);
      osc.stop(t + 1.8);
    };
  }

  /**
   * Advances the pentatonic sequencer.
   * Called from the draw loop based on BPM timing.
   */
  function tickSequencer() {
    if (!seq.active || !sfxPluck) return;
    const now      = audioCtx.currentTime;
    const interval = 60 / seq.bpm;
    if (now - seq.lastTime < interval) return;
    seq.lastTime = now;

    const freq = seq.scale[seq.step % seq.scale.length];
    sfxPluck(freq);

    /* Advance step — occasionally skip or repeat for musicality */
    const rand = Math.random();
    if (rand < 0.12)      seq.step += 2; // leap
    else if (rand < 0.22) seq.step += 0; // hold
    else                  seq.step += 1;
    seq.step = ((seq.step % seq.scale.length) + seq.scale.length) % seq.scale.length;
  }

  /* ----------------------------------------------------------
     5. RESIZE — DPR aware, orientation-safe
  ---------------------------------------------------------- */
  function resize() {
    /* DPR capped at 2.5 for mobile efficiency; 3× on desktop */
    DPR = Math.min(window.devicePixelRatio || 1, window.innerWidth < 600 ? 2.5 : 3.0);
    W   = window.innerWidth;
    H   = window.innerHeight;

    [bgCanvas, fgCanvas].forEach(c => {
      c.width        = Math.round(W * DPR);
      c.height       = Math.round(H * DPR);
      c.style.width  = W + 'px';
      c.style.height = H + 'px';
    });

    /* Re-apply DPR scale after resize (canvas reset clears transform) */
    bgCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
    fgCtx.setTransform(DPR, 0, 0, DPR, 0, 0);

    buildGrid();
    buildPetals();
    buildParticles();
  }

  /* ----------------------------------------------------------
     6a. SCENE BUILDER — perspective dot/line grid horizon
  ---------------------------------------------------------- */
  /** Grid data — rebuilt on resize */
  let gridLines  = []; // perspective converging lines
  let gridPoints = []; // intersection dot data

  function buildGrid() {
    gridLines  = [];
    gridPoints = [];

    const vx = W * 0.5;   // vanishing point X (centre)
    const vy = H * 0.52;  // vanishing point Y (slight below mid)
    const RAYS  = 28;      // lines radiating from vanishing point
    const RINGS = 14;      // concentric ellipses of dots

    /* Build perspective rays */
    for (let i = 0; i < RAYS; i++) {
      const ang   = (i / RAYS) * Math.PI * 2;
      const ex    = vx + Math.cos(ang) * W * 2.2;
      const ey    = vy + Math.sin(ang) * H * 2.2;
      gridLines.push({ vx, vy, ex, ey, ang });
    }

    /* Build intersection dots along rings */
    for (let r = 1; r <= RINGS; r++) {
      const ringT = r / RINGS;
      const rx    = W * 0.72 * ringT;
      const ry    = H * 0.44 * ringT;
      for (let i = 0; i < RAYS; i++) {
        const ang = (i / RAYS) * Math.PI * 2;
        gridPoints.push({
          x:     vx + Math.cos(ang) * rx,
          y:     vy + Math.sin(ang) * ry,
          alpha: 0.04 + ringT * 0.14,
          phase: Math.random() * Math.PI * 2,
          speed: 0.25 + Math.random() * 0.55,
          ring:  r,
        });
      }
    }
  }

  /* ----------------------------------------------------------
     6b. SCENE BUILDER — petal carousel
  ---------------------------------------------------------- */
  function buildPetals() {
    petals = [];
    const minDim = Math.min(W, H);

    for (let i = 0; i < PETAL_N; i++) {
      const colIdx = i % SPECTRAL.length;
      petals.push({
        id:          i,
        baseAngle:   (i / PETAL_N) * Math.PI * 2,
        angle:       (i / PETAL_N) * Math.PI * 2,
        orbitR:      minDim * (i % 2 === 0 ? 0.29 : 0.24), // two radii for depth
        tiltPhase:   (i / PETAL_N) * Math.PI * 2,
        size:        clamp(minDim * 0.095, 34, 90),
        phase:       Math.random() * Math.PI * 2,
        floatFreq:   0.007 + Math.random() * 0.005,
        floatAmp:    0.05,
        color:       SPECTRAL[colIdx],
        colorB:      SPECTRAL[(colIdx + 2) % SPECTRAL.length],
        hovered:     false,
        bloomK:      1.0,    // current bloom scale (lerped)
        aimBloom:    1.0,
        glowPulse:   0,      // extra glow intensity on hit
        mandDepth:   14 + (i % 5) * 4,
        frostA:      0.14 + Math.random() * 0.12,
        velAngle:    0,
      });
    }
  }

  /* ----------------------------------------------------------
     6c. SCENE BUILDER — ambient floating particles
  ---------------------------------------------------------- */
  function buildParticles() {
    particles = [];
    for (let i = 0; i < MAX_PARTICLES; i++) {
      spawnParticle(true);
    }
  }

  /**
   * Spawns a single ambient particle.
   * @param {boolean} randomY - if true, spawn anywhere; else spawn at top
   */
  function spawnParticle(randomY = false) {
    const col = SPECTRAL[Math.floor(Math.random() * SPECTRAL.length)];
    particles.push({
      x:      Math.random() * W,
      y:      randomY ? Math.random() * H : H + 10,
      vx:     (Math.random() - 0.5) * 0.4,
      vy:     -(0.15 + Math.random() * 0.5),
      r:      0.5 + Math.random() * 1.8,
      alpha:  0.15 + Math.random() * 0.45,
      color:  col,
      phase:  Math.random() * Math.PI * 2,
      twinkle: 0.3 + Math.random() * 0.7,
      life:   1.0,
      decay:  0.0008 + Math.random() * 0.0012,
    });
  }

  /* ----------------------------------------------------------
     7a. DRAW — background layer (bgCanvas, redrawn every frame)
     Contents: deep space gradient, aurora sweep, grid
  ---------------------------------------------------------- */
  function drawBackground() {
    const t = bgTick * 0.008;
    bgTick++;

    /* --- Deep space base gradient --- */
    const bg = bgCtx.createRadialGradient(
      W * 0.5, H * 0.44, 0,
      W * 0.5, H * 0.44, Math.max(W, H) * 0.92
    );
    bg.addColorStop(0,    '#071414');
    bg.addColorStop(0.35, '#040C0C');
    bg.addColorStop(0.75, '#020708');
    bg.addColorStop(1,    '#020408');
    bgCtx.fillStyle = bg;
    bgCtx.fillRect(0, 0, W, H);

    /* --- Aurora sweep bands --- */
    drawAurora(t);

    /* --- Perspective grid --- */
    drawGrid(t);

    /* --- Central horizon lotus glow --- */
    const cg = bgCtx.createRadialGradient(
      W * 0.5, H * 0.52, 0,
      W * 0.5, H * 0.52, Math.min(W, H) * 0.38
    );
    cg.addColorStop(0,   'rgba(0,200,200,0.055)');
    cg.addColorStop(0.5, 'rgba(0,120,120,0.022)');
    cg.addColorStop(1,   'rgba(0,0,0,0)');
    bgCtx.fillStyle = cg;
    bgCtx.fillRect(0, 0, W, H);
  }

  /**
   * Draws sweeping aurora-borealis light bands across the canvas.
   * Uses stacked sinusoidal paths for an organic feel.
   */
  function drawAurora(t) {
    const BANDS = 4;
    const aColors = [
      [0, 200, 200], [199, 125, 255], [0, 180, 160], [72, 202, 228]
    ];

    for (let b = 0; b < BANDS; b++) {
      const [r, g, bl] = aColors[b % aColors.length];
      const yBase  = H * (0.28 + b * 0.11);
      const sweep  = Math.sin(t * 0.7 + b * 1.2) * H * 0.06;
      const alpha  = 0.018 + 0.012 * Math.sin(t * 0.5 + b * 2.1);

      bgCtx.beginPath();
      bgCtx.moveTo(0, yBase + sweep);

      for (let x = 0; x <= W; x += W / 10) {
        const wave = Math.sin(t * 0.9 + x * 0.003 + b * 1.4) * H * 0.04;
        bgCtx.lineTo(x, yBase + sweep + wave);
      }

      bgCtx.lineTo(W, 0);
      bgCtx.lineTo(0, 0);
      bgCtx.closePath();

      bgCtx.fillStyle = `rgba(${r},${g},${bl},${alpha})`;
      bgCtx.fill();
    }
  }

  /**
   * Draws the perspective dot-line grid with vanishing-point convergence.
   * Animated by camera theta offset for parallax illusion.
   */
  function drawGrid(t) {
    const thetaShift = (cam.theta * 0.04) % (Math.PI * 2 / (gridLines.length || 1));

    /* Perspective rays */
    gridLines.forEach((ln, i) => {
      const pulse = 0.4 + 0.6 * Math.sin(t * 0.6 + i * 0.22);
      const alpha = 0.025 * pulse;
      bgCtx.beginPath();
      bgCtx.moveTo(ln.vx, ln.vy);
      bgCtx.lineTo(ln.ex, ln.ey);
      bgCtx.strokeStyle = `rgba(0,200,200,${alpha})`;
      bgCtx.lineWidth   = 0.5;
      bgCtx.stroke();
    });

    /* Grid intersection dots with pulse */
    gridPoints.forEach(dot => {
      const pulse = 0.5 + 0.5 * Math.sin(t * dot.speed + dot.phase);
      const a     = dot.alpha * (0.55 + pulse * 0.45);
      const r     = dot.ring <= 3 ? 0.7 : 1.0;

      bgCtx.beginPath();
      bgCtx.arc(dot.x, dot.y, r, 0, Math.PI * 2);
      bgCtx.fillStyle = `rgba(0,229,229,${a})`;
      bgCtx.fill();
    });
  }

  /* ----------------------------------------------------------
     7b. DRAW — connection lines between petals (drawn behind them)
  ---------------------------------------------------------- */
  function drawConnections(projected) {
    const t = tick * 0.013;

    /* Ring connections (adjacent petals) */
    for (let i = 0; i < PETAL_N; i++) {
      const pa = projected[i];
      const pb = projected[(i + 1) % PETAL_N];
      if (!pa || !pb) continue;

      const avgAlpha = clamp((pa.sz + pb.sz) * 0.5 * 0.18, 0.025, 0.16);
      const dash     = (t * 32 + i * 18) % 32;

      fgCtx.save();
      fgCtx.setLineDash([5, 12]);
      fgCtx.lineDashOffset = -dash;
      fgCtx.beginPath();
      fgCtx.moveTo(pa.sx, pa.sy);

      /* Gentle quadratic arc through a midpoint */
      const mx = (pa.sx + pb.sx) * 0.5 + Math.sin(t + i * 0.7) * 18;
      const my = (pa.sy + pb.sy) * 0.5 + Math.cos(t + i * 0.5) * 12;
      fgCtx.quadraticCurveTo(mx, my, pb.sx, pb.sy);

      fgCtx.strokeStyle = `rgba(0,229,229,${avgAlpha})`;
      fgCtx.lineWidth   = 0.7;
      fgCtx.stroke();
      fgCtx.setLineDash([]);
      fgCtx.restore();
    }

    /* Cross connections (every 5th petal — pentagram-like) */
    for (let i = 0; i < PETAL_N; i++) {
      const pa = projected[i];
      const pb = projected[(i + 5) % PETAL_N];
      if (!pa || !pb) continue;

      const avgAlpha = clamp((pa.sz + pb.sz) * 0.5 * 0.10, 0.012, 0.09);
      fgCtx.beginPath();
      fgCtx.moveTo(pa.sx, pa.sy);
      fgCtx.lineTo(pb.sx, pb.sy);
      fgCtx.strokeStyle = `rgba(199,125,255,${avgAlpha})`;
      fgCtx.lineWidth   = 0.45;
      fgCtx.stroke();
    }
  }

  /* ----------------------------------------------------------
     7c. DRAW — single holographic lotus petal
     Each petal is a multi-layer teardrop stack with:
       - outer halo (radial gradient glow)
       - 2 rings × 7 teardrop petals each (outer + inner)
       - Mandelbrot circuit traces
       - iridescent shimmer pass
       - centre gem
       - frost depth reflection
  ---------------------------------------------------------- */
  function drawPetal(p, px, py, scale, depthAlpha) {
    const sz  = p.size * scale;
    const t   = tick * 0.016;
    const col = p.color;
    const colB = p.colorB;
    const ga  = depthAlpha;

    fgCtx.save();
    fgCtx.translate(px, py);

    /* ---- Outer aura halo ---- */
    const haloR = sz * 2.6 + p.glowPulse * sz * 0.8;
    const halo  = fgCtx.createRadialGradient(0, 0, sz * 0.1, 0, 0, haloR);
    halo.addColorStop(0,   hexA(col, ga * 0.38 + p.glowPulse * 0.22));
    halo.addColorStop(0.4, hexA(col, ga * 0.10));
    halo.addColorStop(0.8, hexA(colB, ga * 0.04));
    halo.addColorStop(1,   hexA(col, 0));
    fgCtx.beginPath();
    fgCtx.arc(0, 0, haloR, 0, Math.PI * 2);
    fgCtx.fillStyle = halo;
    fgCtx.fill();

    /* ---- Rotation including camera offset + slow spin ---- */
    const rotOff = p.angle + cam.theta * 0.22 + t * 0.28;
    fgCtx.rotate(rotOff);

    /* ---- Petal layers (outer + inner ring of teardrops) ---- */
    const RINGS_L  = 2;
    const LEAVES   = 8; // teardrops per ring
    for (let layer = 0; layer < RINGS_L; layer++) {
      const lScale = layer === 0 ? 1.0   : 0.6;
      const lAlpha = layer === 0 ? ga * 0.88 : ga * 0.6;
      const lRot   = layer === 0 ? 0     : Math.PI / LEAVES;

      for (let j = 0; j < LEAVES; j++) {
        const ang   = (j / LEAVES) * Math.PI * 2 + lRot;
        const pulse = 1 + 0.05 * Math.sin(t * 2.4 + j * 0.85 + p.phase);
        const tH    = sz * lScale * pulse;
        const tW    = sz * 0.30 * lScale * pulse;

        fgCtx.save();
        fgCtx.rotate(ang);

        /* Teardrop path */
        fgCtx.beginPath();
        fgCtx.moveTo(0, 0);
        fgCtx.bezierCurveTo( tW, -tH * 0.18,  tW,  tH,  0,  tH);
        fgCtx.bezierCurveTo(-tW,  tH,         -tW, -tH * 0.18,  0,  0);
        fgCtx.closePath();

        /* Holographic fill — 3-stop gradient with iridescent mid */
        const pg = fgCtx.createLinearGradient(0, 0, 0, tH);
        pg.addColorStop(0,   hexA(col,        lAlpha * 0.95));
        pg.addColorStop(0.38, hexA(P.bone,   lAlpha * 0.28));
        pg.addColorStop(0.70, hexA(colB,      lAlpha * 0.55));
        pg.addColorStop(1,   hexA(P.tealDeep, lAlpha * 0.80));
        fgCtx.fillStyle = pg;
        fgCtx.fill();

        /* Edge luminance line */
        fgCtx.strokeStyle = hexA(col, lAlpha * 0.65);
        fgCtx.lineWidth   = 0.55 / scale;
        fgCtx.stroke();

        fgCtx.restore();
      }
    }

    /* ---- Mandelbrot circuit traces ---- */
    drawCircuit(sz * 0.70, col, ga, p.mandDepth, p.phase + t * 0.48);

    /* ---- Iridescent shimmer rings (animated) ---- */
    for (let s = 0; s < 3; s++) {
      const sr    = sz * (0.38 + s * 0.18);
      const sAlpha = ga * (0.06 - s * 0.015) * (0.5 + 0.5 * Math.sin(t * 1.8 + s * 1.1 + p.phase));
      fgCtx.beginPath();
      fgCtx.arc(0, 0, sr, 0, Math.PI * 2);
      fgCtx.strokeStyle = hexA(s % 2 === 0 ? col : colB, sAlpha);
      fgCtx.lineWidth   = 0.8;
      fgCtx.stroke();
    }

    /* ---- Centre gem (radial white-to-colour) ---- */
    const gemR = sz * 0.20;
    const gem  = fgCtx.createRadialGradient(0, 0, 0, 0, 0, gemR);
    gem.addColorStop(0,   `rgba(255,255,255,${ga * 0.92})`);
    gem.addColorStop(0.35, hexA(col, ga * 0.85));
    gem.addColorStop(0.75, hexA(P.tealMid, ga * 0.45));
    gem.addColorStop(1,   hexA(col, 0));
    fgCtx.beginPath();
    fgCtx.arc(0, 0, gemR, 0, Math.PI * 2);
    fgCtx.fillStyle = gem;
    fgCtx.fill();

    /* ---- Frost depth reflection (below the petal) ---- */
    fgCtx.save();
    fgCtx.scale(1, -0.28);
    fgCtx.translate(0, -sz * 0.12);
    fgCtx.globalAlpha = p.frostA * ga;

    for (let j = 0; j < LEAVES; j++) {
      const ang = (j / LEAVES) * Math.PI * 2;
      const tH  = sz * 0.9;
      const tW  = sz * 0.28;
      fgCtx.save();
      fgCtx.rotate(ang);
      fgCtx.beginPath();
      fgCtx.moveTo(0, 0);
      fgCtx.bezierCurveTo( tW, -tH * 0.18,  tW,  tH,  0,  tH);
      fgCtx.bezierCurveTo(-tW,  tH,         -tW, -tH * 0.18,  0,  0);
      fgCtx.closePath();
      const fg = fgCtx.createLinearGradient(0, 0, 0, tH);
      fg.addColorStop(0,  hexA(P.bone, 0.22));
      fg.addColorStop(1,  hexA(col,   0.04));
      fgCtx.fillStyle = fg;
      fgCtx.fill();
      fgCtx.restore();
    }
    fgCtx.restore();

    fgCtx.restore(); // restore main petal transform
  }

  /**
   * Draws golden-ratio recursive circuit traces inside a petal.
   * Implements Mandelbrot-border-style branching complexity.
   */
  function drawCircuit(radius, col, alpha, depth, phase) {
    fgCtx.save();

    function branch(x, y, len, angle, d) {
      if (d <= 0 || len < 1.0) return;

      const ex = x + len * Math.cos(angle);
      const ey = y + len * Math.sin(angle);
      const tNorm  = 1 - d / depth;
      const bAlpha = alpha * (0.50 - tNorm * 0.36) *
                     (0.45 + 0.55 * Math.sin(phase + tNorm * 5.2));

      fgCtx.beginPath();
      fgCtx.moveTo(x, y);
      fgCtx.lineTo(ex, ey);
      fgCtx.strokeStyle = hexA(col, Math.max(0, bAlpha));
      fgCtx.lineWidth   = Math.max(0.28, (1.2 - tNorm) * 1.0);
      fgCtx.stroke();

      branch(ex, ey, len / PHI,        angle - 0.44,         d - 1);
      branch(ex, ey, len / PHI,        angle + 0.44,         d - 1);
      if (d % 3 === 0) {
        branch(ex, ey, len / (PHI * 1.7), angle + Math.PI * 0.5, d - 2);
      }
    }

    const ROOTS = 8;
    for (let i = 0; i < ROOTS; i++) {
      const ang = (i / ROOTS) * Math.PI * 2 + phase * 0.10;
      branch(
        Math.cos(ang) * radius * 0.07,
        Math.sin(ang) * radius * 0.07,
        radius * 0.33,
        ang,
        Math.min(depth, 8) // mobile-safe recursion cap
      );
    }

    fgCtx.restore();
  }

  /* ----------------------------------------------------------
     7d. DRAW — central mandala geometry ring
     Always-visible sacred geometry at the lotus origin.
  ---------------------------------------------------------- */
  function drawCentralMandala() {
    const cx  = W * 0.5;
    const cy  = H * 0.5;
    const t   = tick * 0.010;
    const R   = Math.min(W, H) * 0.068;

    fgCtx.save();
    fgCtx.translate(cx, cy);

    /* Six rotating petals of geometry */
    for (let pass = 0; pass < 2; pass++) {
      const rot     = t * (pass === 0 ? 0.6 : -0.38);
      const rings   = pass === 0 ? 6 : 12;
      const baseA   = pass === 0 ? 0.22 : 0.10;
      const colStr  = pass === 0 ? P.tealBright : P.lav;

      fgCtx.save();
      fgCtx.rotate(rot);

      for (let i = 0; i < rings; i++) {
        const ang = (i / rings) * Math.PI * 2;
        const pulse = 0.85 + 0.15 * Math.sin(t * 2.2 + i * 0.9);
        const r     = R * pulse;

        fgCtx.beginPath();
        fgCtx.moveTo(0, 0);
        fgCtx.arc(0, 0, r, ang - Math.PI / rings, ang + Math.PI / rings);
        fgCtx.closePath();
        fgCtx.strokeStyle = hexA(colStr, baseA * pulse);
        fgCtx.lineWidth   = 0.7;
        fgCtx.stroke();
      }
      fgCtx.restore();
    }

    /* Centre glow dot */
    const cg = fgCtx.createRadialGradient(0, 0, 0, 0, 0, R * 0.5);
    cg.addColorStop(0,   `rgba(255,255,255,${0.45 + 0.15 * Math.sin(t * 3)})`);
    cg.addColorStop(0.4, hexA(P.tealBright, 0.35));
    cg.addColorStop(1,   hexA(P.tealBright, 0));
    fgCtx.beginPath();
    fgCtx.arc(0, 0, R * 0.5, 0, Math.PI * 2);
    fgCtx.fillStyle = cg;
    fgCtx.fill();

    fgCtx.restore();
  }

  /* ----------------------------------------------------------
     7e. DRAW — floating ambient particles
  ---------------------------------------------------------- */
  function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];

      /* Twinkle using life + sine */
      const tw   = 0.5 + 0.5 * Math.sin(tick * 0.05 * p.twinkle + p.phase);
      const a    = p.alpha * p.life * tw;

      fgCtx.beginPath();
      fgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      fgCtx.fillStyle = hexA(p.color, a);
      fgCtx.fill();

      /* Micro glow on larger particles */
      if (p.r > 1.2) {
        fgCtx.beginPath();
        fgCtx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2);
        fgCtx.fillStyle = hexA(p.color, a * 0.15);
        fgCtx.fill();
      }

      /* Update position */
      p.x   += p.vx;
      p.y   += p.vy;
      p.life -= p.decay;

      /* Recycle dead particles */
      if (p.life <= 0 || p.y < -10) {
        particles.splice(i, 1);
        spawnParticle(false);
      }
    }
  }

  /* ----------------------------------------------------------
     7f. DRAW — bloom rings (expanding concentric glow rings)
  ---------------------------------------------------------- */
  function drawBloomRings() {
    for (let i = bloomRings.length - 1; i >= 0; i--) {
      const ring = bloomRings[i];
      ring.r    += ring.speed;
      ring.alpha *= 0.90;

      fgCtx.beginPath();
      fgCtx.arc(ring.x, ring.y, ring.r, 0, Math.PI * 2);
      fgCtx.strokeStyle = hexA(ring.col, ring.alpha);
      fgCtx.lineWidth   = ring.w;
      fgCtx.stroke();

      if (ring.alpha < 0.004) bloomRings.splice(i, 1);
    }
  }

  /* ----------------------------------------------------------
     7g. DRAW — shockwave bursts (large, fast)
  ---------------------------------------------------------- */
  function drawShockwaves() {
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const sw = shockwaves[i];
      sw.r    += sw.speed;
      sw.alpha *= 0.87;
      sw.speed *= 1.04; // accelerates outward

      fgCtx.beginPath();
      fgCtx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
      fgCtx.strokeStyle = hexA(sw.col, sw.alpha);
      fgCtx.lineWidth   = sw.w * (1 - sw.r / sw.maxR);
      fgCtx.stroke();

      if (sw.alpha < 0.003 || sw.r > sw.maxR) shockwaves.splice(i, 1);
    }
  }

  /* ----------------------------------------------------------
     7h. DRAW — 3D project a petal to screen coords
  ---------------------------------------------------------- */
  function projectPetal(p) {
    const orb = p.orbitR;
    const ax  = p.angle + cam.theta;

    /* 3D position on oblate spheroid shell */
    const x3d = orb * Math.cos(ax) * Math.cos(cam.phi - p.tiltPhase * 0.16);
    const y3d = orb * Math.sin(p.tiltPhase * 0.12) - orb * 0.28 * Math.sin(cam.phi);
    const z3d = orb * Math.sin(ax) * Math.cos(cam.phi - p.tiltPhase * 0.16);

    /* Perspective projection */
    const fov = 580 * cam.zoom;
    const zd  = fov / (fov + z3d + orb * 0.65);

    return {
      sx:  W * 0.5 + x3d * zd,
      sy:  H * 0.5 + y3d * zd,
      sz:  zd,
      z3d: z3d,
    };
  }

  /* ----------------------------------------------------------
     8. MAIN DRAW LOOP
  ---------------------------------------------------------- */
  function render() {
    rafId = requestAnimationFrame(render);
    tick++;

    /* ---- Camera physics ---- */
    const lerpK = 0.044; // smoothing factor (lower = floatier)

    /* Apply gyroscope tilt if available */
    if (gyro.supported) {
      cam.aimTheta += gyro.gamma * 0.0004;
      cam.aimPhi   += gyro.beta  * 0.0002;
    }

    cam.theta += (cam.aimTheta - cam.theta) * lerpK;
    cam.phi   += (cam.aimPhi   - cam.phi)   * lerpK;
    cam.zoom  += (cam.aimZoom  - cam.zoom)  * 0.05;

    /* Auto-orbit (slow idle drift) */
    if (!cam.dragging) {
      cam.aimTheta += 0.0010;
      cam.velX *= 0.96;
      cam.velY *= 0.96;
      cam.aimTheta += cam.velX;
      cam.aimPhi   += cam.velY;
      cam.aimPhi    = clamp(cam.aimPhi, -0.58, 0.72);
    }

    /* ---- Petal float + bloom lerp ---- */
    const t = tick * 0.011;
    petals.forEach(p => {
      p.angle      = p.baseAngle + Math.sin(t * p.floatFreq * 7 + p.phase) * p.floatAmp;
      p.bloomK    += (p.aimBloom - p.bloomK) * 0.14;
      p.glowPulse *= 0.90; // decay extra glow after bloom
    });

    /* ---- Audio sequencer ---- */
    if (audioReady && seq.active) tickSequencer();

    /* ============================================================
       BACKGROUND CANVAS REDRAW
    ============================================================ */
    drawBackground();

    /* ============================================================
       FOREGROUND CANVAS REDRAW
    ============================================================ */
    fgCtx.clearRect(0, 0, W, H);

    /* Project all petals */
    const projected = petals.map(p => {
      const proj = projectPetal(p);
      return { sx: proj.sx, sy: proj.sy, sz: proj.sz, z3d: proj.z3d, p };
    });

    /* Sort back-to-front by z (painter's algorithm) */
    projected.sort((a, b) => a.z3d - b.z3d);

    /* Connection lines (drawn behind petals) */
    drawConnections(projected);

    /* Petals */
    projected.forEach(({ sx, sy, sz, p }) => {
      const depthAlpha = clamp(sz * 0.88, 0.25, 1.0);
      drawPetal(p, sx, sy, sz * p.bloomK, depthAlpha);
    });

    /* Central mandala */
    drawCentralMandala();

    /* Particles */
    drawParticles();

    /* Bloom rings */
    drawBloomRings();

    /* Shockwaves */
    drawShockwaves();

    /* ---- Pointer hit-test vs petals ---- */
    if (ptr.active) {
      projected.forEach(({ sx, sy, sz, p }) => {
        const dx   = ptr.x - sx;
        const dy   = ptr.y - sy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const hitR = p.size * sz * p.bloomK * 1.5;

        if (dist < hitR && !p.hovered) {
          p.hovered      = true;
          p.aimBloom     = 1.45;
          p.glowPulse    = 0.55;
          spawnBloom(sx, sy, p.color, 7);
          if (sfxBloom) sfxBloom();
        } else if (dist >= hitR && p.hovered) {
          p.hovered      = false;
          p.aimBloom     = 1.0;
        }
      });
    }
  }

  /* ----------------------------------------------------------
     SPAWN HELPERS
  ---------------------------------------------------------- */

  /**
   * Spawns concentric bloom rings at a position.
   */
  function spawnBloom(x, y, col, count = 5) {
    for (let i = 0; i < count; i++) {
      bloomRings.push({
        x,
        y,
        r:     6 + i * 10,
        speed: 2.8 + i * 0.9,
        alpha: 0.72 - i * 0.09,
        col,
        w:     1.4 - i * 0.12,
      });
    }
  }

  /**
   * Spawns a large shockwave ring (canvas-level interaction).
   */
  function spawnShockwave(x, y, col = P.tealBright) {
    const maxR = Math.max(W, H) * 0.55;
    shockwaves.push({
      x, y,
      r:     12,
      speed: 5.5,
      alpha: 0.65,
      col,
      w:     3.5,
      maxR,
    });
    shockwaves.push({
      x, y,
      r:     6,
      speed: 4.0,
      alpha: 0.40,
      col:   P.bone,
      w:     1.5,
      maxR:  maxR * 0.7,
    });
  }

  /**
   * Spawns DOM spark elements flying outward from a point.
   * Purely CSS-animated for crisp response on mobile.
   */
  function spawnDOMSparks(cx, cy, col, count = 10) {
    for (let i = 0; i < count; i++) {
      const spark = document.createElement('div');
      spark.className = 'spark';
      const ang  = (i / count) * Math.PI * 2 + Math.random() * 0.4;
      const dist = 60 + Math.random() * 90;
      const ex   = Math.cos(ang) * dist;
      const ey   = Math.sin(ang) * dist;
      spark.style.cssText = `
        left: ${cx}px;
        top:  ${cy}px;
        background: ${col};
        box-shadow: 0 0 6px ${col};
        --spark-end: translate(${ex}px, ${ey}px);
        animation-delay: ${Math.random() * 0.12}s;
        animation-duration: ${0.7 + Math.random() * 0.35}s;
      `;
      document.body.appendChild(spark);
      spark.addEventListener('animationend', () => spark.remove(), { once: true });
    }
  }

  /* ----------------------------------------------------------
     9. INPUT HANDLING
  ---------------------------------------------------------- */

  /** Extracts {x, y} from mouse or first touch */
  function getXY(e) {
    if (e.changedTouches && e.changedTouches.length > 0) {
      const r = fgCanvas.getBoundingClientRect();
      return {
        x: e.changedTouches[0].clientX - r.left,
        y: e.changedTouches[0].clientY - r.top,
      };
    }
    if (e.touches && e.touches.length > 0) {
      const r = fgCanvas.getBoundingClientRect();
      return {
        x: e.touches[0].clientX - r.left,
        y: e.touches[0].clientY - r.top,
      };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function onDown(e) {
    /* Bypass when play button receives interaction */
    if (e.target === playBtn || playBtn.contains(e.target)) return;
    e.preventDefault();

    cam.dragging = true;
    const pt     = getXY(e);
    cam.lastX    = pt.x;
    cam.lastY    = pt.y;
    cam.velX     = 0;
    cam.velY     = 0;
  }

  function onMove(e) {
    e.preventDefault();

    /* Pinch-zoom (two-finger) */
    if (e.touches && e.touches.length === 2) {
      const dx   = e.touches[0].clientX - e.touches[1].clientX;
      const dy   = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (!pinch.active) {
        pinch.active    = true;
        pinch.startDist = dist;
        pinch.startZoom = cam.aimZoom;
      }
      cam.aimZoom = clamp(pinch.startZoom * (dist / pinch.startDist), 0.5, 2.4);
      return;
    }
    pinch.active = false;

    const pt = getXY(e);
    ptr.x      = pt.x;
    ptr.y      = pt.y;
    ptr.active = true;

    if (!cam.dragging) return;

    const dx = pt.x - cam.lastX;
    const dy = pt.y - cam.lastY;
    cam.lastX = pt.x;
    cam.lastY = pt.y;

    /* Sensitivity — finer on tall screens */
    const sens = 0.0038;
    cam.velX = dx * sens;
    cam.velY = dy * sens * 0.52;

    cam.aimTheta += cam.velX;
    cam.aimPhi   += cam.velY;
    cam.aimPhi    = clamp(cam.aimPhi, -0.58, 0.72);
  }

  function onUp(e) {
    cam.dragging = false;
    pinch.active = false;

    /* Quick tap / click — spawn shockwave + sound */
    if (e.type === 'touchend' || e.type === 'mouseup') {
      const pt = getXY(e);
      if (Math.abs(cam.velX) < 0.003 && Math.abs(cam.velY) < 0.003) {
        spawnShockwave(pt.x, pt.y, P.tealBright);
        spawnDOMSparks(pt.x, pt.y, '#00E5E5', 12);
        if (sfxBell)  sfxBell();
        if (sfxChime) sfxChime();
      }
    }
  }

  function onLeave() {
    cam.dragging  = false;
    ptr.active    = false;
    pinch.active  = false;
  }

  function onWheel(e) {
    e.preventDefault();
    cam.aimZoom = clamp(cam.aimZoom - e.deltaY * 0.0007, 0.5, 2.4);
  }

  /* Gyroscope support (iOS requests explicit permission; Android is automatic) */
  function requestGyro() {
    if (typeof DeviceOrientationEvent === 'undefined') return;

    const listen = () => {
      window.addEventListener('deviceorientation', (e) => {
        if (e.beta === null && e.gamma === null) return;
        gyro.supported = true;
        gyro.beta      = e.beta  || 0; // front-back tilt
        gyro.gamma     = e.gamma || 0; // left-right tilt
      }, { passive: true });
    };

    /* iOS 13+ requests explicit permission */
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(state => { if (state === 'granted') listen(); })
        .catch(() => {});
    } else {
      listen();
    }
  }

  /* Attach all canvas input events */
  const evtOpts = { passive: false };
  fgCanvas.addEventListener('mousedown',   onDown,  evtOpts);
  fgCanvas.addEventListener('mousemove',   onMove,  evtOpts);
  fgCanvas.addEventListener('mouseup',     onUp,    evtOpts);
  fgCanvas.addEventListener('mouseleave',  onLeave, evtOpts);
  fgCanvas.addEventListener('touchstart',  onDown,  evtOpts);
  fgCanvas.addEventListener('touchmove',   onMove,  evtOpts);
  fgCanvas.addEventListener('touchend',    onUp,    evtOpts);
  fgCanvas.addEventListener('touchcancel', onLeave, evtOpts);
  fgCanvas.addEventListener('wheel',       onWheel, evtOpts);

  /* Pointer-leave for whole document */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      cam.dragging = false;
      ptr.active   = false;
    }
  });

  /* ----------------------------------------------------------
     PLAY BUTTON LOGIC
  ---------------------------------------------------------- */
  let soundRunning = false;

  playBtn.addEventListener('click', () => {
    if (!soundRunning) {
      /* First press — start audio, show mute button */
      setupAudio();
      soundRunning = true;
      playIcon.style.display  = 'none';
      pauseIcon.style.display = 'block';
      playBtn.classList.add('active');
      playBtn.setAttribute('aria-label', 'Pause sound');
      muteBtn.style.display = 'block';
      requestGyro();
      if (sfxBell) setTimeout(sfxBell, 600);
    } else {
      /* Toggle suspend / resume */
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
        muted = false;
        playIcon.style.display  = 'none';
        pauseIcon.style.display = 'block';
        if (masterGain) masterGain.gain.setTargetAtTime(0.78, audioCtx.currentTime, 0.4);
      } else {
        audioCtx.suspend();
        muted = true;
        playIcon.style.display  = 'block';
        pauseIcon.style.display = 'none';
        if (masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
      }
    }
  });

  muteBtn.addEventListener('click', () => {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
      muted = false;
      masterGain.gain.setTargetAtTime(0.78, audioCtx.currentTime, 0.4);
      muteBtn.innerHTML = '♬ &nbsp;Sound';
      playIcon.style.display  = 'none';
      pauseIcon.style.display = 'block';
    } else {
      audioCtx.suspend();
      muted = true;
      masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
      muteBtn.innerHTML = '&#9888; &nbsp;Silence';
      playIcon.style.display  = 'block';
      pauseIcon.style.display = 'none';
    }
  });

  /* ----------------------------------------------------------
     UTILITIES
  ---------------------------------------------------------- */

  /** Clamps val between lo and hi */
  function clamp(val, lo, hi) {
    return val < lo ? lo : val > hi ? hi : val;
  }

  /**
   * Converts a hex colour + alpha to a rgba() string.
   * Cached via a small Map for speed.
   */
  const _hexCache = new Map();
  function hexA(hex, alpha) {
    let rgb = _hexCache.get(hex);
    if (!rgb) {
      const n = parseInt(hex.slice(1), 16);
      rgb = [(n >> 16) & 255, (n >> 8) & 255, n & 255];
      _hexCache.set(hex, rgb);
    }
    return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha.toFixed(3)})`;
  }

  /* ----------------------------------------------------------
     10. BOOT
  ---------------------------------------------------------- */
  function boot() {
    resize();
    window.addEventListener('resize',            resize, { passive: true });
    window.addEventListener('orientationchange', () => {
      /* Small delay to let the browser reflow after orientation change */
      setTimeout(resize, 160);
    }, { passive: true });

    render();

    /* Lift loading veil after first meaningful paint */
    setTimeout(() => veil.classList.add('gone'), 900);
  }

  boot();

  </script>
</body>
